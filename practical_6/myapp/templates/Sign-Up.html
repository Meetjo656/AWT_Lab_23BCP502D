{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class='card'>
  <h2>Create Account</h2>
  <form method='post'>
    {% csrf_token %}
    {{ form.as_p }}
    <button class='btn' type='submit'>Sign Up</button>
  </form>
  <p>Already have an account? <a href='{% url "myapp:login" %}'>Login</a></p>
</div>
{% endblock %}
