{% extends 'base.html' %}
{% block title %}{% if object %}Edit{% else %}Add{% endif %} Item{% endblock %}
{% block content %}
  <div class='card'>
    <h2>{% if object %}Edit{% else %}Add{% endif %} Item</h2>
    <form method='post'>
      {% csrf_token %}
      {{ form.as_p }}
      <button class='btn' type='submit'>Save</button>
      <a class='btn btn-secondary' href='{% url "myapp:item-list" %}'>Cancel</a>
    </form>
  </div>
{% endblock %}
