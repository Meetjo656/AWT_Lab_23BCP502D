{% extends 'base.html' %}
{% block title %}Delete Item{% endblock %}
{% block content %}
  <div class='card'>
    <h2>Delete Item</h2>
    <p>Are you sure you want to delete "{{ object.title }}"?</p>
    <form method='post'>
      {% csrf_token %}
      <button class='btn' type='submit'>Yes, delete</button>
      <a class='btn btn-secondary' href='{% url "myapp:item-list" %}'>Cancel</a>
    </form>
  </div>
{% endblock %}
