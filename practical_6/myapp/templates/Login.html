{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class='card'>
  <h2>Login</h2>
  <form method='post'>
    {% csrf_token %}
    {{ form.as_p }}
    <button class='btn' type='submit'>Login</button>
  </form>
  <p>Don't have an account? <a href='{% url "myapp:signup" %}'>Sign up</a></p>
{% endblock %}
